name: "Setup Node and pnpm"
description: "Install pnpm and Node.js with pnpm store caching"
inputs:
  node-version:
    description: "Node.js version to install (any actions/setup-node spec, e.g. '22', 'lts/*')"
    required: false
    default: "lts/*"
  pnpm-version:
    description: "pnpm version to install. Defaults to the packageManager field in package.json"
    required: false
runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
